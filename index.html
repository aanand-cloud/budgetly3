<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Budgetly</title>
<meta name="theme-color" content="#0f6b66"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--acc:#0f6b66;--acc2:#138a84;--accL:#e6f7f6;--bg:#f0fafa;--surf:#fff;--bord:#d8ecea;--bord2:#c0dbd8;--text:#0d1f1e;--muted:#6a8e8b;--faint:#eaf5f4;--faint2:#dceeed;--grn:#16a34a;--grnL:#dcfce7;--red:#dc2626;--redL:#fee2e2;--amb:#d97706;--ambL:#fef3c7;--r:14px;--r-lg:20px;--r-xl:26px;--sh:0 1px 4px rgba(0,0,0,.06);--sh2:0 4px 16px rgba(0,0,0,.09);--sh3:0 12px 40px rgba(0,0,0,.14)}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--bord2);border-radius:99px}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
#loginWrap{position:fixed;inset:0;z-index:9999;background:linear-gradient(155deg,#021a18 0%,#0f6b66 55%,#1ab5ad 100%);display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.lcard{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);border-radius:24px;padding:32px 26px;width:100%;max-width:380px;color:#fff;backdrop-filter:blur(16px)}
.lcard h1{font-family:'Instrument Serif',serif;font-size:30px;text-align:center;margin-bottom:4px;letter-spacing:-.5px}
.lsub{font-size:12px;opacity:.5;text-align:center;margin-bottom:26px}
.lf{margin-bottom:14px}
.lf label{display:block;font-size:10px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;opacity:.55;margin-bottom:6px}
.lf input{width:100%;padding:13px 14px;background:rgba(255,255,255,.11);border:1.5px solid rgba(255,255,255,.18);border-radius:12px;color:#fff;font-size:15px;outline:none;font-family:inherit;transition:border .15s}
.lf input::placeholder{color:rgba(255,255,255,.28)}
.lf input:focus{border-color:rgba(255,255,255,.6);background:rgba(255,255,255,.16)}
.lerr{display:none;background:rgba(220,38,38,.28);border-radius:9px;padding:9px 12px;font-size:13px;color:#fca5a5;text-align:center;margin-bottom:12px}
.lbtn{width:100%;padding:14px;border:none;border-radius:13px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;transition:opacity .15s}
.lbtn:active{opacity:.8}
.lbtn-primary{background:#fff;color:#0f6b66}
.lbtn-ghost{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);color:rgba(255,255,255,.65);margin-top:10px;font-size:13px;font-weight:600}
.lreset{background:none;border:none;color:rgba(255,255,255,.22);font-size:11px;cursor:pointer;text-decoration:underline;font-family:inherit;display:block;margin:12px auto 0}
.pdots{display:flex;justify-content:center;gap:14px;margin:18px 0 26px}
.pdot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.32);transition:all .15s}
.pdot.filled{background:#fff;border-color:#fff}
.pdot.bad{background:#f87171;border-color:#f87171;animation:shake .35s ease}
.ppad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pkey{height:60px;border-radius:13px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.13);color:#fff;font-size:22px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .1s}
.pkey:active{background:rgba(255,255,255,.26)}
.pkey.sm{font-size:14px;font-weight:600;background:rgba(255,255,255,.05)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
#app{display:none;flex-direction:column;min-height:100vh}
#app.on{display:flex}
header{height:60px;padding:0 22px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#021a18,#0f6b66);position:sticky;top:0;z-index:50;gap:12px;box-shadow:0 2px 16px rgba(15,107,102,.35)}
.logo{font-family:'Instrument Serif',serif;font-size:26px;color:#fff;flex-shrink:0;letter-spacing:-.5px;cursor:pointer}
.hdr-r{display:flex;align-items:center;gap:7px;flex-shrink:0}
.hbtn{height:34px;padding:0 12px;border-radius:9px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:background .15s}
.hbtn:hover{background:rgba(255,255,255,.2)}
.hbtn.acc{background:#fff;color:#0f6b66;border:none;font-weight:700}
.hbtn.acc:hover{background:#d4f5f2}
.avbtn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.16);border:2px solid rgba(255,255,255,.32);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.app-body{display:flex;flex:1;overflow:hidden}
.sidebar{width:212px;flex-shrink:0;background:var(--surf);border-right:1px solid var(--bord);display:flex;flex-direction:column;padding:14px 9px;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto}
.sidebar::-webkit-scrollbar{display:none}
.stab{display:flex;align-items:center;gap:10px;padding:10px 11px;border-radius:11px;border:none;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);background:transparent;transition:all .18s;text-align:left;width:100%;font-family:inherit}
.stab:hover{background:var(--faint);color:var(--text)}
.stab.on{background:var(--accL);color:var(--acc);box-shadow:inset 3px 0 0 var(--acc)}
.stab .ti{width:30px;height:30px;border-radius:8px;background:var(--faint);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.stab.on .ti{background:var(--accL)}
.sdiv{height:1px;background:var(--bord);margin:8px 3px}
.slbl{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:7px 11px 3px}
.sfooter{margin-top:auto;padding-top:12px;border-top:1px solid var(--bord)}
main{flex:1;padding:26px 28px;background:var(--bg);overflow-y:auto}
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--bord);z-index:60;padding-bottom:env(safe-area-inset-bottom)}
.bnav-inner{display:flex;height:56px;align-items:stretch}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:transparent;cursor:pointer;font-family:inherit;position:relative}
.btab .bi{font-size:18px;line-height:1}
.btab .bl{font-size:9px;font-weight:700;color:var(--muted)}
.btab.on .bl{color:var(--acc)}
.btab.on::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:26px;height:3px;background:var(--acc);border-radius:0 0 4px 4px}
.bnav-fab{flex:none;width:60px;display:flex;align-items:center;justify-content:center}
.fab{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;color:#fff;font-size:22px;cursor:pointer;box-shadow:0 4px 14px rgba(15,107,102,.4);display:flex;align-items:center;justify-content:center}
.card{background:var(--surf);border-radius:var(--r-lg);padding:20px 22px;border:1px solid var(--bord);margin-bottom:16px;box-shadow:var(--sh)}
.card:last-child{margin-bottom:0}
.ctitle{font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:18px}
.sc{background:var(--surf);border-radius:var(--r-lg);padding:18px 20px;border:1px solid var(--bord);box-shadow:var(--sh)}
.scico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:12px}
.slbl2{font-size:9px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.sval{font-size:24px;font-weight:800;letter-spacing:-1px;line-height:1}
.ssub{font-size:11px;color:var(--muted);margin-top:4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:15px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:15px}
.wb{background:linear-gradient(135deg,#021a18 0%,#0f6b66 60%,#1ab5ad 100%);border-radius:var(--r-xl);padding:26px 28px;margin-bottom:20px;color:#fff;position:relative;overflow:hidden}
.wb::before,.wb::after{content:'';position:absolute;border-radius:50%;pointer-events:none}
.wb::before{top:-60px;right:-60px;width:220px;height:220px;background:rgba(255,255,255,.05)}
.wb::after{bottom:-70px;right:50px;width:160px;height:160px;background:rgba(255,255,255,.03)}
.wb-greet{font-size:13px;opacity:.7;margin-bottom:3px}
.wb-name{font-family:'Instrument Serif',serif;font-size:28px;margin-bottom:16px;letter-spacing:-.4px}
.wb-stats{display:flex;gap:24px;flex-wrap:wrap}
.wb-lbl{font-size:10px;opacity:.55;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.wb-val{font-size:19px;font-weight:700}
.tx{display:flex;align-items:center;gap:12px;padding:10px 8px;border-radius:11px;margin:0 -8px;transition:background .14s;position:relative}
.tx+.tx{border-top:1px solid var(--faint2)}
.tx:hover{background:var(--faint)}
.tx-ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.tx-body{flex:1;min-width:0}
.tx-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.tx-tag{background:var(--faint);color:var(--muted);padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;border:1px solid var(--bord)}
.tx-rec{background:var(--accL);color:var(--acc);padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600}
.tx-amt{font-weight:700;font-size:14px;white-space:nowrap}
.tx-amt.income{color:var(--grn)}
.tx-amt.expense{color:var(--red)}
.tx-btns{display:flex;gap:4px;opacity:0;transition:opacity .14s}
.tx:hover .tx-btns{opacity:1}
.tx-btn{width:44px;height:44px;border-radius:9px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}
.tx-btn.edit{background:var(--accL);color:var(--acc)}
.tx-btn.del{background:var(--redL);color:var(--red)}
.btn{padding:9px 15px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:6px;line-height:1;font-family:inherit;white-space:nowrap;transition:all .16s}
.btn-p{background:var(--acc);color:#fff;box-shadow:0 2px 8px rgba(15,107,102,.25)}
.btn-p:hover{background:var(--acc2);transform:translateY(-1px)}
.btn-g{background:var(--faint);color:var(--text);border:1px solid var(--bord)}
.btn-g:hover{background:var(--faint2)}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:8px}
.btn-danger{background:var(--redL);color:var(--red);border:1px solid rgba(220,38,38,.2)}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.sec-title{font-family:'Instrument Serif',serif;font-size:24px;letter-spacing:-.3px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.44);display:flex;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(4px);animation:fadeIn .18s}
.modal{background:var(--surf);border-radius:22px 22px 0 0;padding:22px 20px 28px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:var(--sh3);animation:slideUp .24s cubic-bezier(.34,1.4,.64,1)}
.mhandle{width:36px;height:4px;border-radius:99px;background:var(--bord2);margin:0 auto 18px}
.mico{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px;margin-bottom:12px}
.mtitle{font-family:'Instrument Serif',serif;font-size:22px;margin-bottom:18px}
.field{margin-bottom:13px}
.field label{display:block;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.field input,.field select{width:100%;padding:11px 13px;background:var(--faint);border:1.5px solid var(--bord);border-radius:11px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border .14s}
.field input:focus,.field select:focus{border-color:var(--acc);background:var(--surf)}
.tog-row{display:flex;gap:8px}
.tog{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--bord);background:var(--faint);color:var(--muted);cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;transition:all .16s}
.tog.income.on{background:#dcfce7;border-color:var(--grn);color:var(--grn)}
.tog.expense.on{background:var(--redL);border-color:var(--red);color:var(--red)}
.checkrow{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--faint);border-radius:11px;border:1.5px solid var(--bord);cursor:pointer;font-size:13px;font-weight:500;margin-bottom:13px}
.checkrow input{width:16px;height:16px;accent-color:var(--acc);flex-shrink:0}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--bord)}
.amtf{position:relative}
.amtf-pfx{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px;font-weight:700;color:var(--muted);pointer-events:none}
.amtf input{padding-left:28px;font-size:18px;font-weight:800}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:13px}
.pill{padding:6px 13px;border-radius:99px;border:1.5px solid var(--bord);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:all .14s}
.pill.on{background:var(--acc);border-color:var(--acc);color:#fff}
.srch-wrap{position:relative;margin-bottom:13px}
.srch-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
.srch-in{width:100%;padding:10px 12px 10px 36px;background:var(--faint);border:1.5px solid var(--bord);border-radius:11px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
.srch-in:focus{border-color:var(--acc);background:var(--surf)}
.tip{display:flex;gap:11px;padding:13px 14px;border-radius:12px;margin-bottom:8px;align-items:flex-start}
.gcard{background:var(--surf);border-radius:var(--r);padding:17px;border:1px solid var(--bord);box-shadow:var(--sh)}
.gbar{height:7px;background:var(--faint2);border-radius:99px;overflow:hidden;margin:11px 0 7px}
.gfill{height:100%;border-radius:99px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.pbar{height:6px;background:var(--faint2);border-radius:99px;overflow:hidden;flex:1;min-width:50px}
.pfill{height:100%;border-radius:99px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700}
.badge-red{background:var(--redL);color:var(--red)}
.badge-acc{background:var(--accL);color:var(--acc)}
.row{display:flex;align-items:center;justify-content:space-between}
.rg{display:flex;align-items:center;gap:8px}
.empty{text-align:center;padding:36px 16px;color:var(--muted);font-size:14px}
.empty-ico{font-size:38px;margin-bottom:9px;opacity:.5}
.abox{background:linear-gradient(135deg,var(--accL),#d4f5f2);border:1px solid rgba(15,107,102,.18);border-radius:var(--r);padding:13px 15px;margin-bottom:15px;display:flex;align-items:center;gap:11px}
.sumrow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--faint2)}
.sumrow:last-child{border-bottom:none}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.chead{text-align:center;font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:6px 0}
.ccell{min-height:60px;border-radius:10px;border:1px solid var(--bord);padding:6px;cursor:pointer;transition:all .14s;background:var(--surf)}
.ccell:hover{border-color:var(--acc);background:var(--accL)}
.ccell.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none}
.ccell.today{border-color:var(--acc);box-shadow:0 0 0 1px var(--acc)}
.ccell.sel{background:var(--accL);border-color:var(--acc)}
.cday{font-size:11px;font-weight:700;margin-bottom:2px}
.cdot{width:5px;height:5px;border-radius:50%;display:inline-block;margin:1px}
.camt{font-size:8px;font-weight:700}
.rg-grp{margin-bottom:16px}
.rg-lbl{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;display:flex;align-items:center;gap:7px;padding-bottom:7px;border-bottom:1px solid var(--bord)}
.rg-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--faint2)}
.rg-row:last-child{border-bottom:none}
.rg-ico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--faint);border:1px solid var(--bord);flex-shrink:0}
.amtw{position:relative;display:inline-block}
.amtw-pfx{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--muted);pointer-events:none;font-weight:600}
.amt-in{width:88px;padding:6px 6px 6px 20px;background:var(--faint);border:1.5px solid var(--bord);border-radius:9px;color:var(--text);font-size:13px;font-weight:700;outline:none;text-align:right;font-family:inherit}
.amt-in:focus{border-color:var(--acc);background:var(--surf)}
.scan-drop{border:2px dashed var(--bord2);border-radius:16px;padding:32px 16px;text-align:center;cursor:pointer;transition:all .18s;background:var(--faint)}
.scan-drop:hover{border-color:var(--acc);background:var(--accL)}
.toast-el{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);padding:11px 18px;border-radius:12px;font-size:13px;font-weight:700;z-index:9999;box-shadow:var(--sh3);border:1px solid;white-space:nowrap;pointer-events:none;font-family:inherit}
.toast-el.success{background:#dcfce7;color:var(--grn);border-color:rgba(22,163,74,.2)}
.toast-el.info{background:var(--accL);color:var(--acc);border-color:rgba(15,107,102,.2)}
.toast-el.warn{background:var(--ambL);color:var(--amb);border-color:rgba(217,119,6,.2)}
.toast-el.err{background:var(--redL);color:var(--red);border-color:rgba(220,38,38,.2)}
.sheet{position:fixed;top:0;right:-100%;width:320px;height:100%;background:var(--surf);border-left:1px solid var(--bord);z-index:150;transition:right .3s cubic-bezier(.4,0,.2,1);padding:24px 20px;overflow-y:auto;box-shadow:var(--sh3)}
.sheet.open{right:0}
.sheet-ovl{position:fixed;inset:0;background:rgba(0,0,0,.22);z-index:149;display:none}
.sheet-ovl.open{display:block}
.psav{width:64px;height:64px;border-radius:50%;background:var(--accL);border:3px solid var(--acc);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px}
.psname{font-family:'Instrument Serif',serif;font-size:20px;text-align:center;margin-bottom:2px}
.pssub{font-size:12px;color:var(--muted);text-align:center;margin-bottom:20px}
.fade-in{animation:fadeUp .22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:960px){.sidebar{display:none}.bnav{display:flex;flex-direction:column}main{padding:14px 12px;padding-bottom:72px}header{height:54px;padding:0 12px}.hbtn span{display:none}}
@media(max-width:640px){.g2,.g3{grid-template-columns:1fr}.sg{grid-template-columns:repeat(2,1fr)}.wb{padding:20px 16px}.wb-name{font-size:22px}}
@media(max-width:400px){.sg{grid-template-columns:1fr}}
body.dark{--bg:#080f0f;--surf:#0c1c1c;--bord:#142828;--bord2:#1a3232;--text:#ddf0ee;--muted:#4a7a77;--faint:#0a1818;--faint2:#102222}
body.dark header{background:linear-gradient(135deg,#010a0a,#042220)}
body.dark .wb{background:linear-gradient(135deg,#010a0a,#042220 60%,#0a504d 100%)}


.wm-sidebar{display:block;text-align:center;padding:10px 0 4px;font-family:'Instrument Serif',serif;font-size:12px;color:var(--muted);opacity:.55;letter-spacing:.3px;font-style:italic}
.wm-sidebar b{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-style:normal}
.wm-main{text-align:center;padding:18px 0 6px;font-family:'Instrument Serif',serif;font-size:12px;color:var(--muted);opacity:.5;letter-spacing:.3px;font-style:italic;pointer-events:none}
.wm-main b{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-style:normal}
@media(max-width:960px){.wm-sidebar{display:none}}

/* MORE DRAWER */
#moreDrawer .btab{flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 6px;min-width:0;flex:1;background:none;border:none;cursor:pointer;font-family:inherit}
#moreDrawer .btab .bi{font-size:22px;line-height:1}
#moreDrawer .btab .bl{font-size:10px;font-weight:700;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:64px}
#moreDrawer .btab.on .bl{color:var(--acc)}
#moreDrawer .btab.on .bi{filter:drop-shadow(0 0 4px var(--acc))}

<style>
/* SPEED DIAL FAB */
.fab-wrap{position:relative;display:flex;align-items:center;justify-content:center;flex-direction:column-reverse}
.fab{width:52px;height:52px;border-radius:50%;background:var(--acc);border:none;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s ease,box-shadow .2s ease;box-shadow:0 4px 14px rgba(15,107,102,.45);position:relative;z-index:2;font-family:inherit}
.fab:active{transform:scale(.93)}
.fab.open{transform:rotate(45deg);background:#dc2626;box-shadow:0 4px 14px rgba(220,38,38,.4)}
.fab-actions{position:absolute;bottom:62px;left:50%;transform:translateX(-50%) translateY(10px);display:flex;flex-direction:column;gap:10px;align-items:center;opacity:0;pointer-events:none;transition:opacity .18s ease,transform .18s ease}
.fab-actions.open{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
.fab-action{display:flex;align-items:center;gap:10px;white-space:nowrap;cursor:pointer}
.fab-action-btn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 3px 10px rgba(0,0,0,.2);transition:transform .15s;font-family:inherit}
.fab-action-btn:active{transform:scale(.9)}
.fab-action-lbl{font-size:12px;font-weight:700;color:#fff;background:rgba(0,0,0,.6);padding:4px 10px;border-radius:99px;order:-1;cursor:pointer}
.fab-backdrop{position:fixed;inset:0;z-index:1;background:rgba(0,0,0,.3);backdrop-filter:blur(2px);display:none}
.fab-backdrop.open{display:block}
.bnav-fab{position:relative;z-index:2}
@keyframes fabPop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
<style>
/* SPENDING BREAKDOWN BARS */
.spend-bar-wrap{height:8px;background:var(--faint2);border-radius:99px;overflow:hidden}
.spend-bar-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
</style>
<style>
@keyframes badgeShimmer{0%{transform:translateX(-100%) skewX(-15deg)}100%{transform:translateX(200%) skewX(-15deg)}}

var mk=function(tag,attrs){
  var el=document.createElement(tag);
  if(!attrs) return el;
  Object.keys(attrs).forEach(function(k){
    if(k==='cls') el.className=attrs[k];
    else if(k==='txt') el.textContent=attrs[k];
    else if(k==='html') el.innerHTML=attrs[k];
    else if(k==='style') el.style.cssText=attrs[k];
    else el.setAttribute(k,attrs[k]);
  });
  return el;
};

  // Parse YYYY-MM-DD as LOCAL time to avoid UTC midnight drift
  if(!s) return new Date();
  var p=s.split('-');
  return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
};
var dateFmt=function(s){
  // Display date from ISO string in local time
  var d=parseDate(s);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');

};

var TRANSFER_CATS={debt_loan:1,debt_card:1,debt_transfer:1};
var stats=function(){
  var inc=0,exp=0,debt=0,byCat={};
  S.tx.forEach(function(t){
    var amt=Math.abs(t.amount||0);
    if(t.type==='income') inc+=amt;
    else if(TRANSFER_CATS[t.category]){
      // Debt/transfer payments tracked separately — not added to expenses
      // to avoid double-counting (the original spend is already in expenses)
      debt+=amt;
    }
    else{exp+=amt;byCat[t.category]=(byCat[t.category]||0)+amt;}
  });
  var bal=inc-exp,savRate=inc>0?Math.round(((inc-exp)/inc)*100):0,debtPmt=debt;
  var catArr=Object.keys(byCat).map(function(k){return{id:k,val:byCat[k]};}).sort(function(a,b){return b.val-a.val;});
  var over=[]; Object.keys(S.lims).forEach(function(c){if(S.lims[c]>0&&(byCat[c]||0)>S.lims[c])over.push({cat:c,spent:byCat[c]||0,lim:S.lims[c]});});
  var recExp=S.rec.filter(function(r){return r.type==='expense';}).reduce(function(s,r){return s+r.amount;},0);
  return{inc:inc,exp:exp,bal:bal,savRate:savRate,debtPmt:debtPmt,byCat:byCat,catArr:catArr,over:over,recExp:recExp};
};
var monthlyData=function(){
  var m={};
  S.tx.forEach(function(t){
    var mo=MONTHS[parseDate(t.date).getMonth()];
    if(!m[mo]) m[mo]={month:mo,inc:0,exp:0};
    if(t.type==='income') m[mo].inc+=t.amount; else m[mo].exp+=t.amount;
  });
  return Object.values(m);
};

var drawPie=function(id,data){
  var c=$(id); if(!c||!data.length) return;
  var ctx=c.getContext('2d'),W=c.offsetWidth||260;
  c.width=W*2; c.height=200*2; c.style.width=W+'px'; c.style.height='200px'; ctx.scale(2,2);
  var cx=W/2,cy=100,r=Math.min(W,200)/2-14,ir=r*.55;
  var tot=data.reduce(function(s,d){return s+d.val;},0),a=-Math.PI/2;
  data.forEach(function(d){
    var sl=(d.val/tot)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,a,a+sl); ctx.closePath();
    ctx.fillStyle=d.color; ctx.fill();
    ctx.beginPath(); ctx.arc(cx,cy,r,a,a+sl); ctx.lineTo(cx,cy);
    ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--surf').trim()||'#fff'; ctx.lineWidth=2; ctx.stroke(); a+=sl;
  });
  ctx.beginPath(); ctx.arc(cx,cy,ir,0,Math.PI*2); ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--surf').trim()||'#fff'; ctx.fill();
};
var drawCumulative=function(id,data){
  // data = [{month, net}] sorted oldest first
  var c=$(id); if(!c||data.length<2) return;
  var ctx=c.getContext('2d'),W=c.offsetWidth||360;
  c.width=W*2; c.height=160*2; c.style.width=W+'px'; c.style.height='160px'; ctx.scale(2,2);
  var pl=48,pr=12,pt=14,pb=26,cw=W-pl-pr,ch=160-pt-pb;
  var surf=getComputedStyle(document.documentElement).getPropertyValue('--surf').trim()||'#fff';
  var mut=getComputedStyle(document.documentElement).getPropertyValue('--muted').trim()||'#6a8e8b';
  var grid=getComputedStyle(document.documentElement).getPropertyValue('--bord').trim()||'#d8ecea';
  // Build cumulative
  var cum=0,points=data.map(function(d){cum+=d.net;return cum;});
  var minV=Math.min.apply(null,points),maxV=Math.max.apply(null,points);
  if(minV===maxV){minV=minV-1;maxV=maxV+1;}
  var range=maxV-minV||1;
  // Grid lines
  for(var i=0;i<=4;i++){
    var y=pt+ch*(1-i/4);
    ctx.strokeStyle=grid; ctx.lineWidth=1; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(pl,y); ctx.lineTo(pl+cw,y); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle=mut; ctx.font='9px sans-serif'; ctx.textAlign='right';
    var v=minV+range*i/4;
    ctx.fillText(Math.abs(v)>=1000?(v/1000).toFixed(1)+'k':Math.round(v),pl-4,y+3);
  }
  // Gradient fill
  var grad=ctx.createLinearGradient(0,pt,0,pt+ch);
  grad.addColorStop(0,'rgba(15,107,102,.22)');
  grad.addColorStop(1,'rgba(15,107,102,.02)');
  ctx.beginPath();
  points.forEach(function(v,i){
    var x=pl+(i/(points.length-1))*cw,y=pt+ch*(1-(v-minV)/range);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.lineTo(pl+cw,pt+ch); ctx.lineTo(pl,pt+ch); ctx.closePath();
  ctx.fillStyle=grad; ctx.fill();
  // Line
  ctx.beginPath(); ctx.strokeStyle='#0f6b66'; ctx.lineWidth=2.5; ctx.lineJoin='round';
  points.forEach(function(v,i){
    var x=pl+(i/(points.length-1))*cw,y=pt+ch*(1-(v-minV)/range);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.stroke();
  // Dots + labels
  points.forEach(function(v,i){
    var x=pl+(i/(points.length-1))*cw,y=pt+ch*(1-(v-minV)/range);
    ctx.beginPath(); ctx.arc(x,y,3.5,0,Math.PI*2);
    ctx.fillStyle=v>=0?'#0f6b66':'#dc2626'; ctx.fill();
    ctx.strokeStyle=surf; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle=mut; ctx.font='8px sans-serif'; ctx.textAlign='center';
    ctx.fillText(data[i].month,x,pt+ch+18);
  });
};
var drawBars=function(id,data){
  var c=$(id); if(!c||!data.length) return;
  var ctx=c.getContext('2d'),W=c.offsetWidth||360;
  c.width=W*2; c.height=190*2; c.style.width=W+'px'; c.style.height='190px'; ctx.scale(2,2);
  var pl=42,pr=8,pt=8,pb=26,cw=W-pl-pr,ch=190-pt-pb;
  var maxV=data.reduce(function(m,d){return Math.max(m,d.inc||0,d.exp||0);},1);
  var gw=cw/data.length,bw=Math.min(gw*.28,18);
  var mut=S.dark?'#4a7a77':'#6a8e8b',grid=S.dark?'#142828':'#d8ecea';
  for(var i=0;i<=4;i++){
    var y=pt+ch*(1-i/4);
    ctx.strokeStyle=grid; ctx.lineWidth=1; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(pl,y); ctx.lineTo(pl+cw,y); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle=mut; ctx.font='9px sans-serif'; ctx.textAlign='right';
    var v=maxV*i/4; ctx.fillText(v>=1000?(v/1000).toFixed(0)+'k':Math.round(v),pl-4,y+3);
  }
  data.forEach(function(d,i){
    var x=pl+gw*i+gw/2,iH=((d.inc||0)/maxV)*ch,eH=((d.exp||0)/maxV)*ch;
    ctx.fillStyle='#16a34a'; ctx.fillRect(x-bw-1,pt+ch-iH,bw,iH);
    ctx.fillStyle='#dc2626'; ctx.fillRect(x+1,pt+ch-eH,bw,eH);
    ctx.fillStyle=mut; ctx.font='9px sans-serif'; ctx.textAlign='center'; ctx.fillText(d.month,x,190-5);
  });
};

// ── PREDICTIVE AI ENGINE ─────────────────────────────────────────────────────
var getPredictions = function(){
  var now = new Date();
  var yr  = now.getFullYear();
  var mo  = now.getMonth();
  var day = now.getDate();
  var daysInMonth  = new Date(yr, mo+1, 0).getDate();
  var daysElapsed  = day;
  var daysLeft     = daysInMonth - day;
  var monthProgress= daysElapsed / daysInMonth; // 0 to 1

  // This month's transactions only
  var moStr = yr+'-'+String(mo+1).padStart(2,'0');
  var moTx  = S.tx.filter(function(t){ return t.date.indexOf(moStr)===0; });

  var moInc = moTx.filter(function(t){return t.type==='income';}).reduce(function(s,t){return s+t.amount;},0);
  var moExp = moTx.filter(function(t){return t.type==='expense';}).reduce(function(s,t){return s+t.amount;},0);
  var moByCat = {};
  moTx.filter(function(t){return t.type==='expense';}).forEach(function(t){
    moByCat[t.category]=(moByCat[t.category]||0)+t.amount;
  });

  // Daily spend rate this month
  var dailyRate = daysElapsed>0 ? moExp/daysElapsed : 0;
  var projectedMonthExp = dailyRate * daysInMonth;

  // Last 3 months average for context
  var history = [];
  for(var i=1;i<=3;i++){
    var d=new Date(yr,mo-i,1);
    var hStr=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    var hExp=S.tx.filter(function(t){return t.date.indexOf(hStr)===0&&t.type==='expense';}).reduce(function(s,t){return s+t.amount;},0);
    if(hExp>0) history.push(hExp);
  }
  var avg3mo = history.length>0 ? history.reduce(function(s,v){return s+v;},0)/history.length : 0;

  var predictions=[];

  // ── Budget overspend predictions ─────────────────────────────
  Object.keys(S.lims).forEach(function(cat){
    var lim=S.lims[cat]; if(lim<=0) return;
    var spent=moByCat[cat]||0; if(spent<=0) return;
    var catRate=spent/daysElapsed;
    var projectedCat=catRate*daysInMonth;
    var overPct=Math.round(((projectedCat-lim)/lim)*100);
    var c=CAT[cat]||{label:cat,icon:'📦'};
    if(projectedCat>lim&&overPct>5){
      predictions.push({
        icon:'⚠️', priority:3, color:'var(--red)', bg:'var(--redL)',
        txt:'At your current pace you will exceed your '+c.label+' budget by '+overPct+'% this month ('+fmt(Math.round(projectedCat))+' vs '+fmt(lim)+' limit).'
      });
    } else if(projectedCat>lim*0.85&&projectedCat<=lim){
      predictions.push({
        icon:'🔶', priority:2, color:'var(--amb)', bg:'var(--ambL)',
        txt:'You are on track to use '+Math.round((projectedCat/lim)*100)+'% of your '+c.label+' budget this month. Just '+fmt(Math.round(lim-spent))+' remaining.'
      });
    }
  });

  // ── Projected month-end balance ──────────────────────────────
  if(moInc>0&&daysElapsed>=5){
    var projectedSavings=moInc-projectedMonthExp;
    var savePct=Math.round((projectedSavings/moInc)*100);
    if(projectedSavings<0){
      predictions.push({
        icon:'🚨', priority:4, color:'var(--red)', bg:'var(--redL)',
        txt:'Projected month-end: you will spend '+fmt(Math.round(Math.abs(projectedSavings)))+' more than you earn. Consider cutting back in the next '+daysLeft+' days.'
      });
    } else if(savePct>=20){
      predictions.push({
        icon:'🌟', priority:1, color:'var(--grn)', bg:'var(--grnL)',
        txt:'On track for a '+savePct+'% savings rate this month ('+fmt(Math.round(projectedSavings))+' projected saved). Keep it up!'
      });
    }
  }

  // ── Compared to 3-month average ──────────────────────────────
  if(avg3mo>0&&daysElapsed>=7){
    var vsAvgPct=Math.round(((projectedMonthExp-avg3mo)/avg3mo)*100);
    if(vsAvgPct>=15){
      predictions.push({
        icon:'📈', priority:2, color:'var(--amb)', bg:'var(--ambL)',
        txt:'You are spending '+vsAvgPct+'% more than your 3-month average ('+fmt(Math.round(projectedMonthExp))+' projected vs '+fmt(Math.round(avg3mo))+' avg).'
      });
    } else if(vsAvgPct<=-10){
      predictions.push({
        icon:'💪', priority:1, color:'var(--grn)', bg:'var(--grnL)',
        txt:'Great discipline! Projected spending is '+Math.abs(vsAvgPct)+'% below your 3-month average. You could save '+fmt(Math.round(avg3mo-projectedMonthExp))+' extra this month.'
      });
    }
  }

  // ── Recurring bills due soon ──────────────────────────────────
  var dueSoon=S.rec.filter(function(r){
    return r.type==='expense'&&r.amount>0&&r.day>=day&&r.day<=day+7;
  });
  if(dueSoon.length>0){
    var dueTotal=dueSoon.reduce(function(s,r){return s+r.amount;},0);
    predictions.push({
      icon:'📅', priority:2, color:'var(--acc)', bg:'var(--accL)',
      txt:dueSoon.length+' bill'+(dueSoon.length>1?'s':'')+' due in the next 7 days: '+
        dueSoon.map(function(r){return r.description;}).join(', ')+
        ' ('+fmt(dueTotal)+' total).'
    });
  }

  // ── Unset budget limits nudge ────────────────────────────────
  var noLimits=Object.values(S.lims).every(function(v){return v===0;});
  if(noLimits&&moExp>0){
    predictions.push({
      icon:'💡', priority:0, color:'var(--acc)', bg:'var(--accL)',
      txt:'You have no budget limits set. Add limits in the Budgets tab to unlock spending predictions.'
    });
  }

  // Sort by priority (highest first), return top 3
  return predictions.sort(function(a,b){return b.priority-a.priority;}).slice(0,3);
};

var getStreak = function(tx){
  if(!tx.length) return 0;
  var dates={};
  tx.forEach(function(t){ dates[t.date]=true; });
  var streak=0, d=new Date();
  for(var i=0;i<365;i++){
    var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(dates[ds]){ streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
};

var calcBadges = function(){
  var st=stats(); var earned=lsGet('bly_badges',{});

        earned[b.id]=today();
        newlyEarned.push(b);
      }
    }catch(e){}
  });
  if(newlyEarned.length){ lsSet('bly_badges',earned); }
  return {earned:earned, newlyEarned:newlyEarned, total:BADGE_DEFS.length};
};

var renderCalendar=function(){
  var yr=S.calY,mo=S.calM;
  var first=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate();
  var cells=[]; for(var i=0;i<first;i++) cells.push(null);
  for(var d=1;d<=dim;d++){
    var ds=yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var dtx=S.tx.filter(function(t){return t.date===ds;});
    cells.push({d:d,ds:ds,txs:dtx,
      exp:dtx.filter(function(t){return t.type==='expense';}).reduce(function(s,t){return s+t.amount;},0),
      inc:dtx.filter(function(t){return t.type==='income';}).reduce(function(s,t){return s+t.amount;},0)
    });
  }
  var tod=today(),m=$('main'); m.innerHTML='';
  var wrap=mk('div',{cls:'fade-in'});
  var hdr=mk('div',{cls:'sec-hdr'}); hdr.appendChild(mk('div',{cls:'sec-title',txt:'Calendar'}));

  var prev=mk('button',{cls:'btn btn-g btn-sm',txt:'‹'}); on(prev,'click',function(){S.calM--;if(S.calM<0){S.calM=11;S.calY--;}renderCalendar();});
  var ml=mk('div',{style:'font-weight:700;font-size:15px;min-width:140px;text-align:center',txt:FMONTHS[mo]+' '+yr});
  var next=mk('button',{cls:'btn btn-g btn-sm',txt:'›'}); on(next,'click',function(){S.calM++;if(S.calM>11){S.calM=0;S.calY++;}renderCalendar();});
  nav.appendChild(prev); nav.appendChild(ml); nav.appendChild(next); hdr.appendChild(nav); wrap.appendChild(hdr);
  var card=mk('div',{cls:'card'});
  var hg=mk('div',{cls:'cgrid',style:'margin-bottom:6px'});
  DAYS.forEach(function(dy){hg.appendChild(mk('div',{cls:'chead',txt:dy}));});
  card.appendChild(hg);
  var bg=mk('div',{cls:'cgrid'});
  cells.forEach(function(cell){
    if(!cell){bg.appendChild(mk('div',{cls:'ccell empty'}));return;}
    var isT=cell.ds===tod,isS=cell.ds===S.calSel;
    var cel=mk('div',{cls:'ccell'+(isT?' today':'')+(isS?' sel':'')}); cel.dataset.caldate=cell.ds;
    var de=mk('div',{cls:'cday',txt:String(cell.d)}); if(isT) de.style.color='var(--acc)'; cel.appendChild(de);

    if(cell.inc>0){var ia=mk('div',{cls:'camt',txt:'+'+fmt(cell.inc)});ia.style.color='var(--grn)';cel.appendChild(ia);}
    var dots=mk('div',{style:'display:flex;flex-wrap:wrap;gap:2px;margin-top:2px'});
    cell.txs.slice(0,4).forEach(function(t){var dot=mk('div',{cls:'cdot'});dot.style.background=(CAT[t.category]||{color:'#888'}).color;dots.appendChild(dot);});
    cel.appendChild(dots); bg.appendChild(cel);
  });
  delegate(bg,'[data-caldate]','click',function(e,el){S.calSel=S.calSel===el.dataset.caldate?null:el.dataset.caldate;renderCalendar();});
  card.appendChild(bg); wrap.appendChild(card);
  if(S.calSel){
    var sel=S.tx.filter(function(t){return t.date===S.calSel;});
    var sc=mk('div',{cls:'card fade-in'}); sc.appendChild(mk('div',{cls:'ctitle',txt:S.calSel}));
    if(sel.length) txList(sel,sc);
    else sc.appendChild(mk('div',{cls:'empty',html:'<div class="empty-ico">📅</div>No transactions on this day'}));
    wrap.appendChild(sc);
  }
  m.appendChild(wrap);
};

  var row=mk('div',{cls:'tog-row'});
  var ti=mk('button',{cls:'tog income'+(cur==='income'?' on':''),txt:'↑ Income'});
  var te=mk('button',{cls:'tog expense'+(cur==='expense'?' on':''),txt:'↓ Expense'});
  on(ti,'click',function(){onChange('income');}); on(te,'click',function(){onChange('expense');});
  row.appendChild(ti); row.appendChild(te); return row;
};
var amtF=function(lbl,val,onInput){
  var f=mk('div',{cls:'field'}); f.appendChild(mk('label',{txt:lbl}));
  var w=mk('div',{cls:'amtf'}); w.appendChild(mk('span',{cls:'amtf-pfx',txt:curSym()}));
  var dv=val?((Math.abs(parseFloat(val))||0)/100).toFixed(2):'';
  var inp=mk('input',{type:'number',placeholder:'0.00',min:'0',step:'0.01',style:'padding-left:28px;font-size:18px;font-weight:800'}); inp.value=dv; inp.addEventListener('input',onInput); w.appendChild(inp); f.appendChild(w); return f;
};
var catSel=function(forType,selId,onCh){
  var s=mk('select'); s.addEventListener('change',onCh);
  CATS.filter(function(c){return forType==='income'?c.id==='income'||c.id==='other':c.id!=='income';}).forEach(function(c){var o=mk('option',{value:c.id,txt:c.icon+' '+c.label});if(c.id===selId)o.selected=true;s.appendChild(o);});
  return s;
};
var allCatSel=function(selId,onCh){
  var s=mk('select'); s.addEventListener('change',onCh);
  CATS.forEach(function(c){var o=mk('option',{value:c.id,txt:c.icon+' '+c.label});if(c.id===selId)o.selected=true;s.appendChild(o);});

var buildTxModal=function(inner){
  var f=S.txF;
  var isInc=f.type==='income';

  // Header icon + title

  ico.style.background=isInc?'var(--grnL)':'var(--redL)';

  inner.appendChild(mk('div',{cls:'mtitle',txt:'Add Transaction'}));

  // ── Type toggle ──────────────────────────────────────────
  inner.appendChild(fld('Type',togR(f.type,function(t){
    S.txF.type=t;
    S.txF.cat=t==='income'?'income':'groceries';
    refreshModal();
  })));

  // ── Amount — big and prominent ───────────────────────────
  inner.appendChild(amtF('Amount ('+curCode()+')',f.amt,function(){S.txF.amt=this.value;}));

  // ── Category grid — visual tile picker ───────────────────
  var catLabel=mk('div',{cls:'field'});
  catLabel.appendChild(mk('label',{txt:'Category'}));
  var catGrid=mk('div',{style:'display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:6px'});

  var visibleCats=CATS.filter(function(c){
    if(isInc) return c.id==='income'||c.id==='freelance'||c.id==='refund'||c.id==='other';
    return c.id!=='income'&&c.id!=='freelance';
  });

  visibleCats.forEach(function(c){
    var isSel=f.cat===c.id;
    var btn=mk('div',{style:'display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 7px;border-radius:12px;border:2px solid '+(isSel?c.color:'var(--bord)')+';background:'+(isSel?c.bg:'var(--faint)')+';cursor:pointer;transition:all .15s;text-align:center'});

  desc.addEventListener('input',function(){S.txF.desc=this.value;});
  inner.appendChild(fld('Description',desc));

  // ── Date ─────────────────────────────────────────────────
  var di=mk('input',{type:'date',value:f.date});
  di.addEventListener('change',function(){S.txF.date=this.value;});
  inner.appendChild(fld('Date',di));

  // ── Repeat & Notes row ───────────────────────────────────
  var cr=mk('label',{cls:'checkrow'});
  var ch=mk('input',{type:'checkbox'});
  if(f.rec) ch.checked=true;
  ch.addEventListener('change',function(){S.txF.rec=this.checked;});
  cr.appendChild(ch);
  cr.appendChild(mk('span',{txt:' 🔁 Repeat monthly'}));

var safeAmt=function(v){
  var n=parseFloat(v);
  if(isNaN(n)||!isFinite(n)||n<=0) return null;
  return Math.round(n*100)/100; // round to 2dp, blocks scientific notation side-effects
};
var doAddTx=function(){
  var f=S.txF;
  var amt=safeAmt(f.amt);
  if(!f.date||!f.desc.trim()||!amt){toast('Please fill in all required fields','err');return;}
  if(amt>999999){toast('Amount seems too large — please check','err');return;}

  S.tx.push({id:uid(),date:f.date,description:f.desc,category:f.cat,amount:amt,type:f.type,recurring:f.rec,notes:f.notes||''});
  var st=stats();
  if(f.type==='expense'&&S.lims[f.cat]>0&&(st.byCat[f.cat]||0)>S.lims[f.cat]) toast('Budget exceeded for '+(CAT[f.cat]||{label:f.cat}).label+'! ⚠️','warn');
  else toast('Transaction added! 🎉');
  S.txF={date:today(),desc:'',cat:'groceries',amt:'',type:'expense',rec:false,notes:''};
  save(); checkAndNotifyBadges(); closeModal(); render();
};
var doEditTx=function(id){
  var tx=S.tx.find(function(t){return t.id===id;}); if(!tx) return;
  S.editTxId=id; S.txF={date:tx.date,desc:tx.description,cat:tx.category,amt:String(tx.amount),type:tx.type,rec:tx.recurring||false,notes:tx.notes||''};
  openModal('txEdit');
};
var doSaveEditTx=function(){
  var f=S.txF;
  var amt=safeAmt(f.amt);
  if(!f.date||!f.desc.trim()||!amt){toast('Please fill in all required fields','err');return;}
  if(amt>999999){toast('Amount seems too large — please check','err');return;}
  S.tx=S.tx.map(function(t){return t.id===S.editTxId?Object.assign({},t,{date:f.date,description:f.desc,category:f.cat,amount:amt,type:f.type,recurring:f.rec,notes:f.notes||''}):t;});
  save(); toast('Updated! ✏️'); closeModal(); render();
};
var _undoTx=null,_undoTimer=null;
var doDelTx=function(id){
  var tx=S.tx.find(function(t){return t.id===id;});
  if(!tx) return;
  // Remove from state IMMEDIATELY so totals update right away
  S.tx=S.tx.filter(function(t){return t.id!==id;});
  save();
  // Re-render so totals update
  render();
  // Show undo toast — if clicked, re-add the transaction
  clearTimeout(_undoTimer);
  var el=$('toastEl');
  el.innerHTML='';
  el.appendChild(mk('span',{txt:'Deleted: '+tx.description+'  '}));
  var ub=mk('button',{style:'background:none;border:1px solid currentColor;border-radius:6px;padding:2px 8px;font-size:12px;font-weight:700;cursor:pointer;color:inherit;font-family:inherit;margin-left:4px',txt:'Undo'});
  on(ub,'click',function(){
    clearTimeout(_undoTimer);
    el.style.display='none';
    S.tx.push(tx);
    S.tx.sort(function(a,b){return parseDate(b.date)-parseDate(a.date);});
    save(); render();
    toast('Restored! ↩️','success');
  });
  el.appendChild(ub);
  el.className='toast-el info'; el.style.display='block';
  _undoTimer=setTimeout(function(){ el.style.display='none'; },5000);
};
var doSaveGoal=function(){

  if(!f.name.trim()||!tgt){toast('Name and target required','err');return;}
  if(S.editGoalId){S.goals=S.goals.map(function(g){return g.id===S.editGoalId?Object.assign({},g,{name:f.name,target:tgt,saved:svd,icon:f.icon,color:f.color}):g;});toast('Goal updated! ✏️');}

var importCSV=function(){
  var inp=document.createElement('input'); inp.type='file'; inp.accept='.csv,text/csv';
  inp.onchange=function(){
    var file=inp.files[0]; if(!file) return;
    var reader=new FileReader();
    reader.onload=function(e){
      var raw=e.target.result;
      var lines=raw.split(/\r?\n/).filter(function(l){return l.trim();});
      if(lines.length<2){toast('CSV appears empty','err');return;}

      // Parse headers
      var parseRow=function(line){
        var cols=[],cur='',inQ=false;
        for(var i=0;i<line.length;i++){
          var ch=line[i];
          if(ch==='"'){ inQ=!inQ; }
          else if(ch===','&&!inQ){ cols.push(cur.trim().replace(/^"|"$/g,'')); cur=''; }
          else cur+=ch;
        }
        cols.push(cur.trim().replace(/^"|"$/g,''));
        return cols;
      };

      var headers=parseRow(lines[0]).map(function(h){return h.toLowerCase().replace(/[^a-z0-9]/g,' ').trim();});

      // Auto-detect known bank formats
      var BANK_PROFILES=[
        {name:'Monzo',        date:'date',        desc:'name',               amt:'amount',           type:null, debitCredit:false},
        {name:'Starling',     date:'date',        desc:'counter party',      amt:'amount (gbp)',     type:null, debitCredit:false},
        {name:'Barclays',     date:'date',        desc:'memo',               amt:'amount',           type:null, debitCredit:false},
        {name:'HSBC',         date:'date',        desc:'description',        amt:'paid out',         type:null, debitCredit:true,  creditCol:'paid in'},
        {name:'Lloyds',       date:'transaction date', desc:'transaction description', amt:'debit amount', type:null, debitCredit:true, creditCol:'credit amount'},
        {name:'NatWest',      date:'date',        desc:'description',        amt:'value',            type:null, debitCredit:false},
        {name:'Budgetly',     date:'date',        desc:'description',        amt:'amount',           type:'type',debitCredit:false},
        {name:'Generic',      date:'date',        desc:'description',        amt:'amount',           type:'type',debitCredit:false},
      ];

      // Score each profile against headers
      var findCol=function(target){ return headers.findIndex(function(h){return h.indexOf(target)>=0;}); };
      var bestProfile=null, bestScore=0;
      BANK_PROFILES.forEach(function(p){
        var score=0;
        if(findCol(p.date)>=0) score+=3;
        if(findCol(p.desc)>=0) score+=3;
        if(findCol(p.amt)>=0) score+=2;
        if(p.type&&findCol(p.type)>=0) score++;
        if(score>bestScore){ bestScore=score; bestProfile=p; }
      });

      // Show column mapper modal
      openImportMapper(headers, lines, parseRow, bestProfile);
    };
    reader.readAsText(file);
  };
  inp.click();
};

var openImportMapper=function(headers, lines, parseRow, suggestedProfile){
  S.modal='import'; $('overlay').style.display='flex';
  var inner=$('modalInner'); inner.innerHTML='';
  inner.appendChild(mk('div',{cls:'mhandle'}));
  inner.appendChild(mk('div',{cls:'mico',txt:'📥',style:'background:var(--accL)'}));
  inner.appendChild(mk('div',{cls:'mtitle',txt:'Map Your CSV Columns'}));

  // Preview of first data row
  var previewRow = lines.length>1 ? parseRow(lines[1]) : [];
  var previewEl=mk('div',{style:'background:var(--faint);border-radius:11px;padding:11px 13px;margin-bottom:16px;border:1px solid var(--bord)'});
  previewEl.appendChild(mk('div',{style:'font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px',txt:'Preview — First Row'}));
  var previewGrid=mk('div',{style:'display:grid;grid-template-columns:1fr 1fr;gap:4px'});
  headers.forEach(function(h,i){
    var cell=mk('div',{style:'font-size:11px'});
    cell.appendChild(mk('span',{style:'font-weight:700;color:var(--text)',txt:h+': '}));
    cell.appendChild(mk('span',{style:'color:var(--muted)',txt:(previewRow[i]||'—').slice(0,20)}));
    previewGrid.appendChild(cell);
  });
  previewEl.appendChild(previewGrid); inner.appendChild(previewEl);

  // Auto-detect notice
  if(suggestedProfile){
    var detect=mk('div',{style:'background:var(--accL);border-radius:10px;padding:9px 13px;margin-bottom:14px;font-size:12px;font-weight:600;color:var(--acc)',txt:'✨ Detected: Looks like a '+suggestedProfile.name+' export — columns pre-filled below'});
    inner.appendChild(detect);
  }

  // Helper: build a select for column mapping
  var colOptions=function(selected){
    var opts='<option value="-1">— Not in this CSV —</option>';
    headers.forEach(function(h,i){ opts+='<option value="'+i+'"'+(i===selected?' selected':'')+'>'+h+(previewRow[i]?' (e.g. '+previewRow[i].slice(0,15)+')':'')+'</option>'; });
    return opts;
  };

  var findBest=function(target){ return headers.findIndex(function(h){return h.indexOf(target)>=0;}); };
  var sp=suggestedProfile||{date:'date',desc:'description',amt:'amount',type:'type',debitCredit:false};

  var mapping={
    date:  findBest(sp.date),
    desc:  findBest(sp.desc),
    amt:   findBest(sp.amt),
    credit: sp.creditCol?findBest(sp.creditCol):-1,
    type:  sp.type?findBest(sp.type):-1,
    notes: findBest('notes')
  };

  var makeMapRow=function(label, key, required){
    var row=mk('div',{cls:'field'});
    row.appendChild(mk('label',{txt:label+(required?' *':' (optional)')}));
    var sel=mk('select'); sel.innerHTML=colOptions(mapping[key]);
    sel.addEventListener('change',function(){ mapping[key]=parseInt(this.value); });
    row.appendChild(sel); return row;
  };

  inner.appendChild(makeMapRow('Date column', 'date', true));
  inner.appendChild(makeMapRow('Description column', 'desc', true));

  // Debit/credit mode vs single amount
  var modeWrap=mk('div',{cls:'field'});
  modeWrap.appendChild(mk('label',{txt:'Amount format'}));
  var modeSel=mk('select');
  modeSel.innerHTML='<option value="single">Single amount column (positive = income, negative = expense)</option>'+
    '<option value="debitcredit"'+(sp.debitCredit?' selected':'')+'>Separate Debit & Credit columns (e.g. HSBC, Lloyds)</option>';
  modeWrap.appendChild(modeSel); inner.appendChild(modeWrap);

  var amtSingle=makeMapRow('Amount column', 'amt', true);
  var amtCredit=makeMapRow('Credit (money IN) column', 'credit', false);
  var amtDebit2=makeMapRow('Debit (money OUT) column', 'amt', false);
  var debitCreditWrap=mk('div');
  debitCreditWrap.appendChild(amtCredit); debitCreditWrap.appendChild(amtDebit2);

  var updateMode=function(){
    var isDebitCredit=modeSel.value==='debitcredit';
    amtSingle.style.display=isDebitCredit?'none':'';
    debitCreditWrap.style.display=isDebitCredit?'':'none';
  };
  modeSel.addEventListener('change',updateMode);
  inner.appendChild(amtSingle); inner.appendChild(debitCreditWrap); updateMode();

  inner.appendChild(makeMapRow('Type column (income/expense)', 'type', false));
  inner.appendChild(makeMapRow('Notes column', 'notes', false));

  // Negate amounts toggle
  var negRow=mk('label',{cls:'checkrow'});
  var negCh=mk('input',{type:'checkbox'}); negRow.appendChild(negCh);
  negRow.appendChild(mk('span',{txt:' Negate amounts (if expenses show as positive numbers)'}));
  inner.appendChild(negRow);

  var foot=mk('div',{cls:'mfoot'});
  var cancelB=mk('button',{cls:'btn btn-g',txt:'Cancel'}); on(cancelB,'click',closeModal);
  var countEl=mk('div',{style:'font-size:12px;color:var(--muted);align-self:center',txt:(lines.length-1)+' rows to import'});
  var importB=mk('button',{cls:'btn btn-p',style:'padding:10px 22px',txt:'Import →'});
  on(importB,'click',function(){
    var isDebitCredit=modeSel.value==='debitcredit';
    var negate=negCh.checked;
    var added=0,skipped=0,errors=[];
    lines.slice(1).forEach(function(line,rowIdx){
      var cols=parseRow(line);
      var date=mapping.date>=0?(cols[mapping.date]||'').trim():'';
      var desc=mapping.desc>=0?(cols[mapping.desc]||'').trim():'';
      if(!date||!desc){skipped++;return;}

      // Normalise date — try common formats
      var normDate=date;
      var dmatch=date.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})$/);
      if(dmatch){
        var yr=dmatch[3].length===2?'20'+dmatch[3]:dmatch[3];
        normDate=yr+'-'+dmatch[2].padStart(2,'0')+'-'+dmatch[1].padStart(2,'0');
      }
      var ymatch=date.match(/^(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})$/);
      if(ymatch) normDate=ymatch[1]+'-'+ymatch[2].padStart(2,'0')+'-'+ymatch[3].padStart(2,'0');

      var amt=0,type='expense';
      if(isDebitCredit){
        var debitVal=parseFloat((cols[mapping.amt]||'').replace(/[£$€,]/g,''))||0;
        var creditVal=parseFloat((cols[mapping.credit]||'').replace(/[£$€,]/g,''))||0;
        if(creditVal>0){ amt=creditVal; type='income'; }
        else if(debitVal>0){ amt=debitVal; type='expense'; }
        else{skipped++;return;}
      } else {
        var rawAmt=parseFloat((cols[mapping.amt]||'').replace(/[£$€,\s]/g,''))||0;
        if(rawAmt===0){skipped++;return;}
        if(negate) rawAmt=-rawAmt;
        if(rawAmt<0){ amt=Math.abs(rawAmt); type='expense'; }
        else{ amt=rawAmt; type='income'; }
      }

      // Type override from column
      if(mapping.type>=0&&cols[mapping.type]){
        var t=(cols[mapping.type]||'').toLowerCase();
        if(t.indexOf('income')>=0||t.indexOf('credit')>=0) type='income';
        else if(t.indexOf('expense')>=0||t.indexOf('debit')>=0) type='expense';
      }

      var notes=mapping.notes>=0?(cols[mapping.notes]||'').trim():'';
      S.tx.push({id:uid(),date:normDate,description:desc.slice(0,60),category:type==='income'?'income':'other',amount:Math.round(amt*100),type:type,recurring:false,notes:notes.slice(0,80)});
      added++;
    });
    save();
    var msg=added+' transactions imported!';
    if(skipped) msg+=' ('+skipped+' skipped)';
    toast(msg+' 📥','success');
    closeModal(); render();
  });
  foot.appendChild(cancelB); foot.appendChild(countEl); foot.appendChild(importB);
  inner.appendChild(foot);
};

var processScannedFile=function(file,apiKey){
  var result=$('scanResult'); result.innerHTML='';
  result.appendChild(mk('div',{style:'text-align:center;padding:20px',html:'<div style="font-size:32px;margin-bottom:8px">🔍</div><div style="font-size:14px;font-weight:600;color:var(--muted)">Reading document...</div>'}));
  var reader=new FileReader();
  reader.onload=function(e){
    var b64=e.target.result.split(',')[1];
    var catIds=CATS.filter(function(c){return c.id!=='income';}).map(function(c){return c.id+':'+c.label;}).join(', ');
    var prompt='Scan this financial document. Return ONLY valid JSON (no markdown):\n{"type":"income or expense","description":"max 40 chars","amount":"number","category":"one of: '+catIds+' or income","date":"YYYY-MM-DD","notes":"max 50 chars","confidence":"high or low"}\nToday: '+today()+'. If unreadable return {"error":"unreadable"}';
    var fetchUrl, fetchHeaders, fetchBody;
    if(SCAN_PROXY_URL){
      // Proxy mode — key stays on server, all users work without setup
      fetchUrl=SCAN_PROXY_URL;
      fetchHeaders={'Content-Type':'application/json'};
      fetchBody=JSON.stringify({image:b64,mediaType:file.type||'image/jpeg',prompt:prompt});
    } else {
      // Personal mode — direct API call with user's own key
      fetchUrl='https://api.anthropic.com/v1/messages';
      fetchHeaders={'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true','x-api-key':apiKey};
      fetchBody=JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:file.type||'image/jpeg',data:b64}},{type:'text',text:prompt}]}]});
    }
    fetch(fetchUrl,{method:'POST',headers:fetchHeaders,
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:file.type||'image/jpeg',data:b64}},
        {type:'text',text:'Scan this financial document. Return ONLY valid JSON (no markdown):\n{"type":"income or expense","description":"max 40 chars","amount":"number","category":"one of: '+catIds+' or income","date":"YYYY-MM-DD","notes":"max 50 chars","confidence":"high or low"}\nToday: '+today()+'. If unreadable return {"error":"unreadable"}'}
      ]}]})
    }).then(function(r){
      if(!r.ok) return r.json().then(function(e){throw new Error((e.error&&e.error.message)||('HTTP '+r.status));});
      return r.json();
    }).then(function(data){
      if(data.error) throw new Error(data.error.message||'API error');
      // Handle both proxy response {text:'...'} and direct API response {content:[{text:'...'}]}
      var text='';
      if(data.text) text=data.text;
      else if(data.content&&data.content[0]) text=data.content[0].text||'';
      text=text.replace(/```[a-z]*/g,'').replace(/```/g,'').trim();
      var parsed=null; try{parsed=JSON.parse(text);}catch(ex){}
      result.innerHTML='';
      if(!parsed||parsed.error){result.appendChild(mk('div',{style:'background:var(--redL);border-radius:12px;padding:14px;text-align:center',html:'<div style="font-size:22px;margin-bottom:7px;color:var(--red)">😕</div><div style="font-weight:700;color:var(--red)">Could not read document</div><div style="font-size:13px;color:var(--red);margin-top:3px">Try a clearer photo</div>'}));return;}
      var amt=parseFloat(parsed.amount); if(isNaN(amt)||amt<=0){result.appendChild(mk('div',{style:'background:var(--ambL);border-radius:12px;padding:14px;text-align:center',html:'<div style="font-weight:700;color:var(--amb)">Amount not detected — fill in manually</div>'}));return;}
      var isInc=parsed.type==='income';
      S.txF={date:parsed.date||today(),desc:parsed.description||'Scanned document',cat:isInc?'income':(parsed.category||'other'),amt:amt.toFixed(2),type:isInc?'income':'expense',rec:false,notes:parsed.notes||''};
      var img=document.createElement('img'); img.src=e.target.result; img.style.cssText='width:100%;border-radius:10px;margin-bottom:10px;max-height:160px;object-fit:cover';
      var box=mk('div',{style:'background:var(--accL);border-radius:12px;padding:14px;border:1px solid rgba(15,107,102,.15)'});
      box.appendChild(mk('div',{style:'font-size:12px;font-weight:700;color:var(--acc);margin-bottom:11px',txt:parsed.confidence==='low'?'⚠️ Low confidence — please review':'✅ Scanned successfully'}));
      var df=mk('div',{cls:'field',style:'margin-bottom:9px'}); df.appendChild(mk('label',{txt:'Date'}));
      var dI=mk('input',{type:'date',style:'width:100%;padding:10px 12px;background:var(--faint);border:1.5px solid var(--bord);border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;outline:none',value:S.txF.date}); dI.addEventListener('change',function(){S.txF.date=this.value;}); df.appendChild(dI); box.appendChild(df);
      var df2=mk('div',{cls:'field',style:'margin-bottom:9px'}); df2.appendChild(mk('label',{txt:'Description'}));
      var dI2=mk('input',{type:'text',style:'width:100%;padding:10px 12px;background:var(--faint);border:1.5px solid var(--bord);border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;outline:none',value:S.txF.desc}); dI2.addEventListener('input',function(){S.txF.desc=this.value;}); df2.appendChild(dI2); box.appendChild(df2);
      box.appendChild(amtF('Amount ('+curCode()+')',S.txF.amt,function(){S.txF.amt=this.value;}));
      var addB=mk('button',{cls:'btn btn-p',style:'width:100%;justify-content:center;padding:12px;margin-top:4px',txt:'Add '+(isInc?'Income':'Expense')});
      on(addB,'click',doAddTx); box.appendChild(addB);
      result.appendChild(img); result.appendChild(box);
    }).catch(function(err){result.innerHTML='';var msg=err&&err.message?err.message:'Check your connection';result.appendChild(mk('div',{style:'background:var(--redL);border-radius:12px;padding:14px;text-align:center',html:'<div style="font-size:20px;margin-bottom:7px">⚠️</div><div style="font-weight:700;color:var(--red)">Scan failed</div><div style="font-size:12px;color:var(--red);margin-top:5px">'+esc(msg)+'</div>'}));});
  };
  reader.readAsDataURL(file);
};

var checkPin=function(){
  var p=getSavedProf();
  if(p&&_pin===p.pin){launchApp(p);}
  else{var pe=$('pinErr');if(pe)pe.style.display='block';for(var i=0;i<4;i++){var d=$('dot'+i);if(d)d.classList.add('bad');}setTimeout(function(){clearPin();},900);}
};
var launchApp=function(prof){
  S.prof=prof;
  $('loginWrap').style.display='none';
  $('app').classList.add('on');
  applyTheme();
  // Always load exactly what is saved — no demo data ever
  S.tx=lsGet('bly_tx',[]);
  render();
};

(function boot(){
  // v5 — full recurring defaults
  if(lsGet('bly_app_ver','')!=='v5'){
    localStorage.removeItem('bly_rec');
    lsSet('bly_app_ver','v5');
  }




  var savedTab=lsGet('bly_tab',null);
  if(savedTab&&TABS.find(function(t){return t.id===savedTab;})) S.tab=savedTab;
  var p=getSavedProf();
  if(p&&p.name&&p.pin){
    $('cardSignup').style.display='none';$('cardPin').style.display='block';
    $('pinAv').textContent=p.avatar||'😊';
    $('pinName').textContent='Welcome back, '+(p.name.split(' ')[0]||'')+'!';
    $('pinUser').textContent='@'+(p.username||p.name||'');
  }
})();

on($('iUser'),'input',function(){this.value=this.value.replace(/[^a-z0-9_]/gi,'').toLowerCase();});
on($('signupBtn'),'click',function(){
  var name=$('iName').value.trim(),uname=$('iUser').value.trim(),pin=$('iPin').value.trim(),err=$('sErr');
  err.style.display='none';
  if(!name){err.textContent='Please enter your name';err.style.display='block';return;}
  if(!uname){err.textContent='Please enter a username';err.style.display='block';return;}
  if(!/^\d{4}$/.test(pin)){err.textContent='PIN must be exactly 4 digits';err.style.display='block';return;}
  var prof={name:name,username:uname,email:$('iEmail').value.trim(),avatar:'😊',currency:'GBP',pin:pin};
  lsSet('bly_prof',prof);launchApp(prof);
});
delegate($('ppad'),'[data-pk]','click',function(e,el){addPin(el.dataset.pk);});
on($('pkBack'),'click',backPin);
on($('pkClear'),'click',clearPin);
on($('notYouBtn'),'click',function(){$('cardPin').style.display='none';$('cardSignup').style.display='block';});
on($('resetBtn'),'click',doResetAll);
on($('resetBtn2'),'click',doResetAll);
on($('themeBtn'),'click',toggleTheme);
on($('scanBtn'),'click',openScanner);
on($('addTxBtn'),'click',function(){openModal('tx');});
on($('profileBtn'),'click',openProfile);
on($('logoBtn'),'click',function(){setTab('dashboard');});
on($('closeProfileBtn'),'click',closeProfile);
on($('profileOvl'),'click',closeProfile);
on($('overlay'),'click',function(e){if(e.target===this)closeModal();});
window.addEventListener('resize',function(){if(S.tab==='dashboard')renderDashboard();});

</script>
</body>
</html>
